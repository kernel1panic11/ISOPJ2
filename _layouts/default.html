<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Implantación de Sistemas Operativos — Repositorio de actividades y prácticas del curso.">
    <title>{% if page.title %}{{ page.title }} · ISOPJ2{% else %}Implantación de Sistemas Operativos{% endif %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    {% if page.index_style %}
    <link rel="stylesheet" href="{{ '/assetscss/index.css' | relative_url }}">
    {% else %}
    <link rel="stylesheet" href="{{ '/assetscss/custom.css' | relative_url }}">
    {% endif %}
</head>
<body>
    {% if page.page_bg %}
    <style>
        :root { --bg-image: url('{{ "/assetscss/" | append: page.page_bg | relative_url }}'); }
    </style>
    {% endif %}

    {{ content }}

    <button id="scrollToTopBtn" class="scroll-btn" title="Ir arriba"><i class="fa-solid fa-arrow-up"></i></button>
    <button id="scrollToBottomBtn" class="scroll-btn" title="Ir abajo"><i class="fa-solid fa-arrow-down"></i></button>

    <script>
    document.getElementById('scrollToTopBtn').addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('scrollToBottomBtn').addEventListener('click', function() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    window.addEventListener('scroll', function() {
        const scrollTopBtn = document.getElementById('scrollToTopBtn');
        const scrollBottomBtn = document.getElementById('scrollToBottomBtn');

        if (window.pageYOffset > 300) {
            scrollTopBtn.style.opacity = '1';
            scrollTopBtn.style.pointerEvents = 'auto';
        } else {
            scrollTopBtn.style.opacity = '0.3';
            scrollTopBtn.style.pointerEvents = 'none';
        }

        if ((window.innerHeight + window.pageYOffset) < document.body.scrollHeight - 100) {
            scrollBottomBtn.style.opacity = '1';
            scrollBottomBtn.style.pointerEvents = 'auto';
        } else {
            scrollBottomBtn.style.opacity = '0.3';
            scrollBottomBtn.style.pointerEvents = 'none';
        }
    });
    </script>
</body>
</html>
